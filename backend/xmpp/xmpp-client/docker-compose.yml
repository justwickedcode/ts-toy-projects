services:
  ejabberd:
    image: ejabberd/ecs:latest
    container_name: ejabberd
    ports:
      - "5222:5222"   # XMPP client connections
      - "5269:5269"   # XMPP server-to-server federation
      - "5280:5280"   # HTTP / BOSH / WebSocket
      - "5443:5443"   # HTTPS / WSS
    volumes:
      - ejabberd_data:/home/ejabberd/database
      - ./ejabberd.yml:/home/ejabberd/conf/ejabberd.yml:ro
    environment:
      - CTL_ON_CREATE=register admin localhost password123
    restart: unless-stopped

volumes:
  ejabberd_data: