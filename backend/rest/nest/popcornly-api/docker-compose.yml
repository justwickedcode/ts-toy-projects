services:
  postgres:
    image: postgres:16-alpine
    ports:
      # WARNING: On Windows, port 5432 may already be taken by a local PostgreSQL installation.
      # Change to '5433:5432' if you have PostgreSQL installed locally.
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: popcornly
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: